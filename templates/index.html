<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月次受講人数集計</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            color: #333;
            padding: 2rem 1rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.25rem; }
        .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 2rem; }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 1.75rem;
            margin-bottom: 1.25rem;
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 6px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
        }
        .upload-area:hover { border-color: #2563eb; background: #eff6ff; }
        .upload-area input[type="file"] { display: none; }
        .upload-area label {
            display: block;
            cursor: pointer;
            color: #666;
            font-size: 0.9rem;
        }
        .upload-area .filename {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #2563eb;
            font-weight: 500;
        }
        .btn {
            display: inline-block;
            padding: 0.55rem 1.25rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
        .btn-download { background: #059669; color: white; }
        .btn-download:hover { background: #047857; }
        .btn-row { margin-top: 1rem; display: flex; gap: 0.75rem; align-items: center; }
        .status-bar {
            display: flex; gap: 1.5rem; flex-wrap: wrap;
            padding: 0.75rem 1rem;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #166534;
        }
        .status-bar span { font-weight: 500; }
        .status-bar .label { color: #15803d; font-weight: 400; }
        .months-list {
            display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem;
        }
        .month-tag {
            background: #dbeafe; color: #1d4ed8;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.78rem;
            font-weight: 500;
        }
        #result { margin-top: 0; }
        .htmx-indicator { display: none; color: #666; font-size: 0.85rem; }
        .htmx-request .htmx-indicator { display: inline; }
        a.back { font-size: 0.85rem; color: #666; text-decoration: none; }
        a.back:hover { color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/auth/logout">← ログアウト</a>
        <h1 style="margin-top: 0.75rem;">月次受講人数集計</h1>
        <p class="subtitle">月別の受講リスト Excel をアップロードし、集計 Pivot を生成・ダウンロードします</p>

        <!-- アップロードフォーム -->
        <div class="card">
            <h2>ファイルアップロード</h2>
            <form
                hx-post="upload"
                hx-target="#result"
                hx-swap="innerHTML"
                hx-encoding="multipart/form-data"
                id="upload-form"
            >
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" name="file" accept=".xlsx,.xls"
                           onchange="updateFilename(this)">
                    <label for="file-input">
                        クリックしてファイルを選択<br>
                        <small style="color: #999;">ファイル名例: 〔定例報告〕2025AC受講者ﾘｽﾄ_2504.xlsx</small>
                    </label>
                    <div class="filename" id="filename-display" style="display:none;"></div>
                </div>
                <div class="btn-row">
                    <button type="submit" class="btn btn-primary" id="submit-btn" disabled>集計する</button>
                    <span class="htmx-indicator">処理中...</span>
                </div>
            </form>
        </div>

        <!-- 現在のデータ状態 -->
        {% if has_data %}
        <div class="card">
            <h2>現在のデータ</h2>
            <div class="status-bar">
                <span><span class="label">集計済み月数: </span>{{ months | length }} ヶ月</span>
                <span><span class="label">行数: </span>{{ total_rows }}</span>
            </div>
            {% if months %}
            <div class="months-list">
                {% for m in months %}
                <span class="month-tag">{{ m }}</span>
                {% endfor %}
            </div>
            {% endif %}
            <div class="btn-row">
                <a href="download" class="btn btn-download">Excel ダウンロード</a>
            </div>
        </div>
        {% endif %}

        <!-- アップロード結果（htmx で差し替え） -->
        <div id="result"></div>
    </div>

    <script>
        function updateFilename(input) {
            const display = document.getElementById('filename-display');
            const btn = document.getElementById('submit-btn');
            if (input.files && input.files[0]) {
                display.textContent = input.files[0].name;
                display.style.display = 'block';
                btn.disabled = false;
            } else {
                display.style.display = 'none';
                btn.disabled = true;
            }
        }

        // アップロード完了後にフォームをリセット
        document.getElementById('upload-form').addEventListener('htmx:afterRequest', function() {
            document.getElementById('file-input').value = '';
            document.getElementById('filename-display').style.display = 'none';
            document.getElementById('submit-btn').disabled = true;
        });
    </script>
</body>
</html>
